<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96">
  <!-- Folder back (depth) -->
  <path d="M6 26 L6 80 Q6 84 10 84 L86 84 Q90 84 90 80 L90 34 Q90 30 86 30 L48 30 L42 22 L10 22 Q6 22 6 26 Z" fill="#1A8F8F"/>
  
  <!-- Folder body - matches Linux Mint cyan/teal -->
  <path d="M4 28 L4 78 Q4 82 8 82 L88 82 Q92 82 92 78 L92 36 Q92 32 88 32 L48 32 L42 24 L8 24 Q4 24 4 28 Z" fill="#26A69A"/>
  
  <!-- Folder tab (top highlight) -->
  <path d="M4 28 Q4 24 8 24 L42 24 L48 32 L8 32 Q4 32 4 28 Z" fill="#4DB6AC"/>
  
  <!-- Light reflection on folder body -->
  <path d="M4 32 L92 32 L92 36 L4 36 Z" fill="#4DB6AC" fill-opacity="0.3"/>
  
  <!-- Crow eye socket (dark feather area) - slightly angled for character -->
  <ellipse cx="48" cy="56" rx="22" ry="15" fill="#1a1a1a" transform="rotate(-3 48 56)"/>
  
  <!-- Crow eye white -->
  <ellipse cx="48" cy="56" rx="16" ry="11" fill="#e0e0e0" transform="rotate(-3 48 56)"/>
  
  <!-- Crow iris - deep black with slight color -->
  <circle cx="49" cy="56" r="9" fill="#0a0a0a"/>
  
  <!-- Inner iris detail -->
  <circle cx="49" cy="56" r="6" fill="#050505"/>
  
  <!-- Primary highlight - the "intelligent" glint -->
  <circle cx="52" cy="53" r="3" fill="white"/>
  
  <!-- Secondary smaller highlight -->
  <circle cx="46" cy="58" r="1.2" fill="white" opacity="0.6"/>
</svg>
